<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예약 관리자 페이지</title>
<style>
  :root {
    --navy:#1a2a4a; --navy-light:#2e4272; --navy-pale:#e4eaf5;
    --accent:#2563b0; --accent-pale:#dbeafe; --accent-border:#93b8e8;
    --paper:#f7f9fc; --parchment:#edf1f8; --border:#c8d3e8;
    --muted:#5a6880; --ink:#0f1d33; --red:#8b2222; --green:#1a6b3a;
    --purple:#6d28d9; --purple-pale:#ede9fe; --purple-border:#a78bfa;
    --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    --radius:10px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--paper); color:var(--ink); font-family:var(--font); min-height:100vh; }

  /* 헤더 */
  .header { background:linear-gradient(135deg,var(--navy),var(--navy-light)); color:white; padding:20px 24px 16px; display:flex; align-items:center; gap:14px; }
  .header-icon { font-size:28px; }
  .header h1 { font-size:18px; font-weight:700; }
  .header .sub { font-size:12px; opacity:.7; margin-top:2px; }

  /* 로그인 영역 */
  .login-wrap { max-width:480px; margin:60px auto; padding:0 20px; }
  .login-card { background:white; border:1px solid var(--border); border-radius:16px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,.08); }
  .login-card h2 { font-size:16px; font-weight:700; color:var(--navy); margin-bottom:20px; text-align:center; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:15px; font-family:var(--font); outline:none; }
  .field input:focus { border-color:var(--accent); }
  .btn-login { width:100%; padding:13px; background:var(--navy); color:white; border:none; border-radius:var(--radius); font-size:15px; font-weight:600; cursor:pointer; font-family:var(--font); }
  .btn-login:hover { background:var(--navy-light); }
  .login-err { color:#c0392b; font-size:13px; text-align:center; margin-top:10px; min-height:18px; }

  /* 메인 영역 */
  .main { padding:16px 20px 40px; max-width:1100px; margin:0 auto; display:none; }
  .main.show { display:block; }

  /* 툴바 */
  .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px; padding:14px 16px; background:white; border:1px solid var(--border); border-radius:var(--radius); }
  .toolbar-title { font-size:15px; font-weight:700; color:var(--navy); flex:1; }
  .search-input { padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:var(--font); outline:none; width:180px; }
  .search-input:focus { border-color:var(--accent); }
  .filter-sel { padding:9px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:var(--font); outline:none; background:white; }
  .btn-sm { padding:9px 16px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--ink); font-family:var(--font); white-space:nowrap; }
  .btn-sm.primary { background:var(--navy); color:white; border-color:var(--navy); }
  .btn-sm.danger  { background:#fff0f0; color:var(--red); border-color:#e8b4b4; }
  .btn-sm.refresh { background:var(--accent-pale); color:var(--accent); border-color:var(--accent-border); }

  /* 통계 카드 */
  .stats-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .stat-card { flex:1; min-width:120px; background:white; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; text-align:center; }
  .stat-num { font-size:28px; font-weight:700; color:var(--navy); line-height:1; }
  .stat-label { font-size:12px; color:var(--muted); margin-top:4px; }
  .stat-card.iphone .stat-num { color:#555; }
  .stat-card.android .stat-num { color:var(--green); }

  /* 테이블 */
  .table-wrap { background:white; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .table-scroll { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; min-width:760px; }
  thead th { background:var(--navy); color:white; font-size:12px; font-weight:600; padding:10px 12px; text-align:left; white-space:nowrap; }
  thead th.center { text-align:center; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
  tbody tr:hover { background:var(--parchment); }
  tbody td { padding:10px 12px; font-size:13px; vertical-align:middle; }
  tbody td.center { text-align:center; }
  .no-data { text-align:center; padding:40px; color:var(--muted); font-size:14px; }

  /* 기기 뱃지 */
  .device-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .device-badge.iphone  { background:#f0f0f0; color:#333; }
  .device-badge.android { background:#e8f5e9; color:#2e7d32; }
  .device-badge.etc     { background:#f3f3f3; color:#888; }

  /* 행 선택 체크박스 */
  input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color:var(--navy); }

  /* 편집 모달 */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(10,20,40,.5); z-index:200; align-items:center; justify-content:center; }
  .modal-bg.show { display:flex; }
  .modal-box { background:white; border-radius:16px; width:90%; max-width:440px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,.18); }
  .modal-head { padding:16px 20px; background:var(--navy); color:white; font-size:15px; font-weight:700; }
  .modal-body { padding:20px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:5px; }
  .modal-field input, .modal-field select { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; font-family:var(--font); outline:none; }
  .modal-field input:focus, .modal-field select:focus { border-color:var(--accent); }
  .modal-foot { display:flex; gap:10px; padding:0 20px 20px; }
  .modal-btn { flex:1; padding:12px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--ink); font-family:var(--font); }
  .modal-btn.confirm { background:var(--navy); color:white; border-color:var(--navy); }
  .modal-btn.cancel  { background:#f3f3f3; }

  /* 토스트 */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:white; padding:11px 22px; border-radius:30px; font-size:14px; transition:transform .25s; z-index:9999; pointer-events:none; }
  .toast.show    { transform:translateX(-50%) translateY(0); }
  .toast.success { background:var(--green); }
  .toast.error   { background:#8b2222; }

  /* 로딩 */
  .loading { display:none; position:fixed; inset:0; background:rgba(247,249,252,.85); z-index:100; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  .loading.show { display:flex; }
  .spinner { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .bulk-bar { display:none; align-items:center; gap:10px; margin-bottom:10px; padding:10px 14px; background:#fff3b0; border:1px solid #f5c842; border-radius:8px; font-size:13px; color:#7a6000; }
  .bulk-bar.show { display:flex; }

  @media(max-width:600px) {
    .header h1 { font-size:15px; }
    .toolbar { flex-direction:column; align-items:stretch; }
    .search-input, .filter-sel { width:100%; }
    .stats-row { gap:8px; }
    .stat-card { min-width:80px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔐</div>
  <div>
    <h1>사무실 예약 — 관리자</h1>
    <div class="sub">예약 현황 모니터링 · 수정 · 삭제</div>
  </div>
</div>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h2>🔑 관리자 로그인</h2>
    <div class="field">
      <label>GAS 웹앱 URL</label>
      <input type="url" id="gasUrl" value="https://script.google.com/macros/s/AKfycbys4LJpn6RuyQO1ZjIN5EAOk9WGJEK5IXHKbtBcPl4O2lWOSb2CdPWHzB9fJrSVtbph/exec" autocomplete="off"/>
    </div>
    <div class="field">
      <label>관리자 키</label>
      <input type="password" id="adminKeyInput" placeholder="관리자 비밀키 입력" autocomplete="off"/>
    </div>
    <button class="btn-login" onclick="doLogin()">로그인 및 데이터 불러오기</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 메인 -->
<div class="main" id="mainArea">
  <!-- 통계 카드 -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">전체 예약</div></div>
    <div class="stat-card iphone"><div class="stat-num" id="statIphone">0</div><div class="stat-label">🍎 iPhone</div></div>
    <div class="stat-card android"><div class="stat-num" id="statAndroid">0</div><div class="stat-label">🤖 Android</div></div>
    <div class="stat-card"><div class="stat-num" id="statEtc">0</div><div class="stat-label">기타</div></div>
    <div class="stat-card"><div class="stat-num" id="statPeople">0</div><div class="stat-label">예약자 수</div></div>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <span class="toolbar-title">예약 목록</span>
    <input type="text" class="search-input" id="searchInput" placeholder="이름 / 조 검색" oninput="renderTable()"/>
    <select class="filter-sel" id="filterDevice" onchange="renderTable()">
      <option value="all">기기 전체</option>
      <option value="iPhone">🍎 iPhone</option>
      <option value="Android">🤖 Android</option>
      <option value="기타">기타</option>
    </select>
    <select class="filter-sel" id="filterDept" onchange="renderTable()">
      <option value="all">조 전체</option>
    </select>
    <button class="btn-sm refresh" onclick="loadData()">🔄 새로고침</button>
    <button class="btn-sm danger" onclick="bulkDelete()">🗑 선택 삭제</button>
    <button class="btn-sm danger" onclick="clearAll()" style="border-color:#a00;color:#a00;">⚠ 전체 초기화</button>
  </div>

  <!-- 선택 삭제 바 -->
  <div class="bulk-bar" id="bulkBar">
    <span id="bulkCount">0개 선택됨</span>
    <button class="btn-sm danger" onclick="bulkDelete()">선택 항목 삭제</button>
    <button class="btn-sm" onclick="clearCheck()">선택 해제</button>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="center"><input type="checkbox" id="checkAll" onchange="toggleAll(this)"/></th>
            <th>이름 (조)</th>
            <th class="center">날짜</th>
            <th class="center">시간</th>
            <th class="center">조</th>
            <th class="center">기기유형</th>
            <th>등록일시</th>
            <th class="center">작업</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="no-data">데이터 없음</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-bg" id="editModal">
  <div class="modal-box">
    <div class="modal-head">✏️ 예약 수정</div>
    <div class="modal-body">
      <input type="hidden" id="editRowIndex"/>
      <div class="modal-field">
        <label>이름 (조 미포함)</label>
        <input type="text" id="editName" placeholder="예: 홍길동"/>
      </div>
      <div class="modal-field">
        <label>조</label>
        <select id="editDept">
          <option>1조</option><option>2조</option><option>3조</option>
          <option>4조</option><option>5조</option><option>6조</option>
          <option>7조</option><option>8조</option><option>9조</option>
          <option>10조</option><option>11조</option>
        </select>
      </div>
      <div class="modal-field">
        <label>날짜키 (MMDD, 예: 0527)</label>
        <input type="text" id="editDateKey" placeholder="0527" maxlength="4"/>
      </div>
      <div class="modal-field">
        <label>시간키 (HHMM, 예: 1300)</label>
        <input type="text" id="editTimeKey" placeholder="1300" maxlength="4"/>
      </div>
      <div class="modal-field">
        <label>기기유형</label>
        <select id="editDevice">
          <option value="iPhone">🍎 iPhone</option>
          <option value="Android">🤖 Android</option>
          <option value="기타">기타</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><p style="font-size:13px;color:var(--muted)">처리 중...</p></div>
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   관리자 페이지 스크립트
   ══════════════════════════════════════════════ */

let GAS_URL = "";
let ADMIN_KEY = "";
let allRows = []; // 서버에서 받은 원본 데이터

/* ── 로그인 ── */
async function doLogin() {
  const url = document.getElementById("gasUrl").value.trim();
  const key = document.getElementById("adminKeyInput").value.trim();
  const errEl = document.getElementById("loginErr");
  errEl.textContent = "";

  if (!url) { errEl.textContent = "GAS URL을 입력해 주세요."; return; }
  if (!key) { errEl.textContent = "관리자 키를 입력해 주세요."; return; }

  GAS_URL = url;
  ADMIN_KEY = key;

  showLoading(true);
  try {
    await loadData();
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("mainArea").classList.add("show");
  } catch(e) {
    errEl.textContent = "로그인 실패: " + e.message;
    GAS_URL = ""; ADMIN_KEY = "";
  } finally {
    showLoading(false);
  }
}

/* ── 데이터 불러오기 ── */
async function loadData() {
  showLoading(true);
  try {
    const res = await fetch(GAS_URL + "?action=getAllRows&adminKey=" + encodeURIComponent(ADMIN_KEY) + "&_=" + Date.now());
    if (!res.ok) throw new Error("서버 응답 오류 " + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.message || "조회 실패");
    allRows = json.rows || [];
    updateStats();
    populateDeptFilter();
    renderTable();
    showToast("✅ " + allRows.length + "건 불러왔습니다.", "success");
  } catch(e) {
    showToast("데이터 로드 실패: " + e.message, "error");
    throw e;
  } finally {
    showLoading(false);
  }
}

/* ── 통계 업데이트 ── */
function updateStats() {
  const iphones  = allRows.filter(r => r.deviceType === "iPhone").length;
  const androids = allRows.filter(r => r.deviceType === "Android").length;
  const etc      = allRows.filter(r => r.deviceType !== "iPhone" && r.deviceType !== "Android").length;
  const people   = new Set(allRows.map(r => r.name)).size;
  document.getElementById("statTotal").textContent   = allRows.length;
  document.getElementById("statIphone").textContent  = iphones;
  document.getElementById("statAndroid").textContent = androids;
  document.getElementById("statEtc").textContent     = etc;
  document.getElementById("statPeople").textContent  = people;
}

/* ── 조 필터 채우기 ── */
function populateDeptFilter() {
  const depts = [...new Set(allRows.map(r => r.dept))].sort();
  const sel = document.getElementById("filterDept");
  sel.innerHTML = '<option value="all">조 전체</option>';
  depts.forEach(d => {
    const o = document.createElement("option");
    o.value = d; o.textContent = d;
    sel.appendChild(o);
  });
}

/* ── 테이블 렌더 ── */
function renderTable() {
  const q      = document.getElementById("searchInput").value.trim().toLowerCase();
  const devF   = document.getElementById("filterDevice").value;
  const deptF  = document.getElementById("filterDept").value;

  const filtered = allRows.filter(r => {
    const nameMatch = !q || r.name.toLowerCase().includes(q) || r.dept.toLowerCase().includes(q);
    const devMatch  = devF  === "all" || r.deviceType === devF;
    const deptMatch = deptF === "all" || r.dept === deptF;
    return nameMatch && devMatch && deptMatch;
  });

  const tbody = document.getElementById("tableBody");
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-data">검색 결과 없음</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const dateDisp = r.dateKey.slice(0,2) + "/" + r.dateKey.slice(2); // MM/DD
    const timeDisp = r.timeKey.slice(0,2) + ":" + r.timeKey.slice(2); // HH:MM
    const devBadge = deviceBadge(r.deviceType);
    return `<tr>
      <td class="center"><input type="checkbox" class="row-check" data-row="${r.rowIndex}" onchange="onCheck()"/></td>
      <td><strong>${esc(r.name)}</strong></td>
      <td class="center">${dateDisp}</td>
      <td class="center">${timeDisp}</td>
      <td class="center">${esc(r.dept)}</td>
      <td class="center">${devBadge}</td>
      <td style="font-size:12px;color:var(--muted)">${esc(r.timestamp)}</td>
      <td class="center" style="white-space:nowrap">
        <button class="btn-sm" onclick="openEdit(${r.rowIndex})" style="padding:6px 12px;font-size:12px;margin-right:4px">✏️ 수정</button>
        <button class="btn-sm danger" onclick="deleteSingle(${r.rowIndex})" style="padding:6px 12px;font-size:12px">🗑</button>
      </td>
    </tr>`;
  }).join("");
}

function deviceBadge(dt) {
  if (dt === "iPhone")  return '<span class="device-badge iphone">🍎 iPhone</span>';
  if (dt === "Android") return '<span class="device-badge android">🤖 Android</span>';
  return '<span class="device-badge etc">기타</span>';
}

/* ── 체크박스 ── */
function toggleAll(cb) {
  document.querySelectorAll(".row-check").forEach(c => c.checked = cb.checked);
  onCheck();
}

function onCheck() {
  const checked = document.querySelectorAll(".row-check:checked");
  const bar = document.getElementById("bulkBar");
  document.getElementById("bulkCount").textContent = checked.length + "개 선택됨";
  bar.classList.toggle("show", checked.length > 0);
}

function clearCheck() {
  document.querySelectorAll(".row-check").forEach(c => c.checked = false);
  document.getElementById("checkAll").checked = false;
  document.getElementById("bulkBar").classList.remove("show");
}

/* ── 단일 삭제 ── */
async function deleteSingle(rowIndex) {
  if (!confirm("이 예약을 삭제하시겠습니까?")) return;
  showLoading(true);
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action:"adminDelete", adminKey:ADMIN_KEY, rowIndexes:[rowIndex] }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.message);
    showToast("삭제 완료", "success");
    await loadData();
  } catch(e) {
    showToast("삭제 실패: " + e.message, "error");
  } finally {
    showLoading(false);
  }
}

/* ── 선택 삭제 ── */
async function bulkDelete() {
  const checked = [...document.querySelectorAll(".row-check:checked")];
  if (checked.length === 0) { showToast("삭제할 항목을 선택해 주세요", "error"); return; }
  if (!confirm(checked.length + "개 예약을 삭제하시겠습니까?")) return;
  const rowIndexes = checked.map(c => parseInt(c.dataset.row));
  showLoading(true);
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action:"adminDelete", adminKey:ADMIN_KEY, rowIndexes }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.message);
    showToast(rowIndexes.length + "건 삭제 완료", "success");
    await loadData();
  } catch(e) {
    showToast("삭제 실패: " + e.message, "error");
  } finally {
    showLoading(false);
  }
}

/* ── 전체 초기화 ── */
async function clearAll() {
  if (!confirm("⚠ 모든 예약 데이터를 삭제합니다. 계속하시겠습니까?")) return;
  if (!confirm("정말로 전체 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) return;
  showLoading(true);
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action:"clearAll", adminKey:ADMIN_KEY }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.message);
    showToast("전체 초기화 완료", "success");
    await loadData();
  } catch(e) {
    showToast("초기화 실패: " + e.message, "error");
  } finally {
    showLoading(false);
  }
}

/* ── 수정 모달 ── */
function openEdit(rowIndex) {
  const row = allRows.find(r => r.rowIndex === rowIndex);
  if (!row) return;
  document.getElementById("editRowIndex").value = rowIndex;
  document.getElementById("editName").value     = row.name.split("(")[0].trim();
  document.getElementById("editDept").value     = row.dept;
  document.getElementById("editDateKey").value  = row.dateKey;
  document.getElementById("editTimeKey").value  = row.timeKey;
  document.getElementById("editDevice").value   = row.deviceType || "기타";
  document.getElementById("editModal").classList.add("show");
}

function closeModal() {
  document.getElementById("editModal").classList.remove("show");
}

async function saveEdit() {
  const rowIndex   = parseInt(document.getElementById("editRowIndex").value);
  const name       = document.getElementById("editName").value.trim();
  const dept       = document.getElementById("editDept").value;
  const dateKey    = document.getElementById("editDateKey").value.trim().padStart(4,"0");
  const timeKey    = document.getElementById("editTimeKey").value.trim().padStart(4,"0");
  const deviceType = document.getElementById("editDevice").value;

  if (!name) { showToast("이름을 입력해 주세요","error"); return; }
  if (!/^\d{4}$/.test(dateKey)) { showToast("날짜키는 4자리 숫자입니다 (예: 0527)","error"); return; }
  if (!/^\d{4}$/.test(timeKey)) { showToast("시간키는 4자리 숫자입니다 (예: 1300)","error"); return; }

  closeModal();
  showLoading(true);
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action:"adminUpdate", adminKey:ADMIN_KEY, rowIndex, name, dept, dateKey, timeKey, deviceType }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.message);
    showToast("✅ 수정 완료", "success");
    await loadData();
  } catch(e) {
    showToast("수정 실패: " + e.message, "error");
  } finally {
    showLoading(false);
  }
}

/* ── 유틸 ── */
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showLoading(v) {
  document.getElementById("loading").classList.toggle("show", v);
}

function showToast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  setTimeout(() => { t.className = "toast"; }, 3500);
}

/* Enter 키 로그인 */
document.getElementById("adminKeyInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>
